<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Birthday!</title>
    <style>
        body { margin: 0; padding: 0; background: #333; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Courier New', Courier, monospace; }
        #game-container { position: relative; width: 100%; max-width: 400px; height: 100%; max-height: 700px; background: #000; overflow: hidden; }
        canvas { display: block; width: 100%; height: 100%; }
        
        /* UI Overlays */
        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; text-shadow: 2px 2px 0 #000; z-index: 10; }
        #start-screen { background: rgba(0,0,0,0.5); }
        #game-over-screen { background: rgba(0,0,0,0.8); display: none; }
        
        h1 { font-size: 30px; margin-bottom: 10px; text-align: center;}
        button { padding: 15px 30px; font-size: 20px; font-weight: bold; background: #f4d03f; border: 4px solid #fff; cursor: pointer; border-radius: 10px; font-family: inherit;}
        
        /* Funny Game Over layout */
        .fail-images { display: flex; align-items: center; gap: 20px; margin-bottom: 20px; }
        .fail-images img { width: 100px; height: 100px; object-fit: contain; }
        
        /* Score Display */
        #score-display { position: absolute; top: 15%; left: 50%; transform: translateX(-50%); font-size: 50px; color: white; font-weight: bold; text-shadow: 3px 3px 0 #000; z-index: 5; pointer-events: none;}
        /* High Score UI during gameplay */
        #high-score-display { 
            position: absolute; 
            top: 15px; 
            left: 15px; 
            font-size: 18px; 
            color: white; 
            font-weight: bold; 
            text-shadow: 2px 2px 0 #000; 
            z-index: 5; 
            pointer-events: none;
        }

    </style>
</head>
<body>

<div id="game-container">
    <div id="score-display">0</div>
    <div id="high-score-display">BEST: 0</div> 
    <canvas id="gameCanvas" width="400" height="700"></canvas>

    
        <div id="start-screen" class="screen">
        <h1>TAP TO START</h1>
        <h2 id="start-high-score">Best Score: 0</h2>
        <button onclick="startGame()">PLAY</button>
    </div>

    <div id="game-over-screen" class="screen">
        <h1>OUCH!</h1>
        <div class="fail-images">
            <img id="gf-fail-img" src="assets/cry_1.png" alt="Crying">
            <img src="assets/you_smile.png" alt="You Smiling">
        </div>
        <h2 id="final-score">Score: 0</h2>
        <h2 id="end-high-score">Best Score: 0</h2>
        <button onclick="resetGame()">PLAY AGAIN</button>
    </div>

</div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    
    // --- LOAD ASSETS ---
    const birdImg1 = new Image(); birdImg1.src = "gf_bird_1.png";
    const birdImg2 = new Image(); birdImg2.src = "gf_bird_2.png";
    const pipeImg = new Image(); pipeImg.src = "pipe_photo.png";
    
    const bgImages = [new Image(), new Image(), new Image(), new Image()];
    bgImages[0].src = "bg_morning.jpg";
    bgImages[1].src = "bg_evening.jpg";
    bgImages[2].src = "bg_dusk.jpg";
    bgImages[3].src = "bg_night.jpg";

    const scoreSound = new Audio("score.mp3");
    const hitSound = new Audio("hit.mp3");

    // --- GAME VARIABLES ---
    let frames = 0;
    let score = 0;
    let gameLoop;
    let isGameOver = false;
    let failAnimationInterval;
    let highScore = localStorage.getItem("birthdayHighScore") || 0;

    const bird = {
        x: 50, y: 300, width: 55, height: 40,
        velocity: 0, gravity: 0.10, jump: -3,
        draw() {
            // Flap animation based on frames
            let img = (frames % 20 < 10) ? birdImg1 : birdImg2;
            ctx.drawImage(img, this.x, this.y, this.width, this.height);
        },
        update() {
            this.velocity += this.gravity;
            this.y += this.velocity;
            if(this.y + this.height >= canvas.height) { this.y = canvas.height - this.height; gameOver(); }
            if(this.y <= 0) { this.y = 0; this.velocity = 0; }
        },
        flap() { this.velocity = this.jump; }
    };

       const pipes = {
        items: [], width: 60, gap: 180, dx: 1.5,
        draw() {
            for(let i = 0; i < this.items.length; i++) {
                let p = this.items[i];
                ctx.drawImage(pipeImg, p.x, p.y, this.width, p.topHeight);
                ctx.drawImage(pipeImg, p.x, p.y + p.topHeight + this.gap, this.width, canvas.height - p.topHeight - this.gap);
            }
        },
        update() {
            // SPEED FORMULA: Base speed (2) + 0.02 for every point she scores.
            // At 10 points, speed is 2.2. At 20 points, speed is 2.4.
            let currentSpeed = this.dx + (score * 0.02);

            // SPAWN LOGIC: Spawn a new pipe whenever the last pipe has moved 400 pixels away
            let lastPipe = this.items[this.items.length - 1];
            if(!lastPipe || (canvas.width - lastPipe.x) >= 350) {
                let topHeight = Math.random() * (canvas.height - this.gap - 200) + 100;
                this.items.push({ x: canvas.width, y: 0, topHeight: topHeight, passed: false });
            }

            for(let i = 0; i < this.items.length; i++) {
                let p = this.items[i];
                
                // Move the pipe left using the new dynamic speed
                p.x -= currentSpeed; 
                
                // Collision Detection
                if(bird.x + bird.width > p.x && bird.x < p.x + this.width &&
                  (bird.y < p.y + p.topHeight || bird.y + bird.height > p.y + p.topHeight + this.gap)) {
                    gameOver();
                }

                // Scoring
                if(p.x + this.width < bird.x && !p.passed) {
                    score++;
                    p.passed = true;
                    document.getElementById("score-display").innerText = score;
                    scoreSound.play();
                }
                
                // Remove pipes that go off-screen to save memory
                if(p.x + this.width < 0) {
                    this.items.shift();
                    i--; // Adjust index after removing an item
                }
            }
        }
    };


    function drawBackground() {
        // Change background every 7 points
        let bgIndex = Math.floor(score / 7) % 4; 
        ctx.drawImage(bgImages[bgIndex], 0, 0, canvas.width, canvas.height);
    }

    function loop() {
        if(isGameOver) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        drawBackground();
        bird.update();
        bird.draw();
        pipes.update();
        pipes.draw();
        
        frames++;
        gameLoop = requestAnimationFrame(loop);
    }

    function startGame() {
        document.getElementById("start-screen").style.display = "none";
        document.getElementById("game-over-screen").style.display = "none";
        bird.y = 300; bird.velocity = 0;
        pipes.items = [];
        score = 0;
        frames = 0;
        isGameOver = false;
        document.getElementById("score-display").innerText = score;
        clearInterval(failAnimationInterval);
        loop();
    }

            function gameOver() {
        isGameOver = true;
        hitSound.play();
        
        // --- HIGH SCORE LOGIC ---
        if (score > highScore) {
            highScore = score;
            localStorage.setItem("birthdayHighScore", highScore); 
            document.getElementById("high-score-display").innerText = "BEST: " + highScore;
        }
        
        // Show the screens and scores
        document.getElementById("game-over-screen").style.display = "flex";
        document.getElementById("final-score").innerText = "Score: " + score;
        document.getElementById("end-high-score").innerText = "Best Score: " + highScore;
        document.getElementById("start-high-score").innerText = "Best Score: " + highScore;
        
        // Alternating funny face logic
        let gfFailImg = document.getElementById("gf-fail-img");
        let toggle = false;
        
        // Clear any existing animation before starting a new one
        clearInterval(failAnimationInterval);
        
        failAnimationInterval = setInterval(() => {
            toggle = !toggle;
            gfFailImg.src = toggle ? "cry_2.png" : "cry_1.png";
        }, 300); 
    }

        
        // Show the screens and scores
        document.getElementById("game-over-screen").style.display = "flex";
        document.getElementById("final-score").innerText = "Score: " + score;
        document.getElementById("end-high-score").innerText = "Best Score: " + highScore;;
        document.getElementById("start-high-score").innerText = "Best Score: " + highScore
    

    function resetGame() {
        startGame();
    }

    // Input Handling
    window.addEventListener("keydown", (e) => { if(e.code === "Space") bird.flap(); });
    window.addEventListener("touchstart", () => bird.flap());
    window.addEventListener("mousedown", () => bird.flap());
    document.getElementById("start-high-score").innerText = "Best Score: " + highScore;
    document.getElementById("start-high-score").innerText = "Best Score: " + highScore;
    // ADD THIS NEW LINE:
    document.getElementById("high-score-display").innerText = "BEST: " + highScore;

</script>
</body>
</html>
